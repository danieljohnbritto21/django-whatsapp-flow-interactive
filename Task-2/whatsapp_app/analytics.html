{% extends "dashboard/base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ page_title }}</h1>
</div>

<form method="get" class="row g-3 align-items-center mb-4">
    <div class="col-auto">
        <label for="date_from" class="form-label">From</label>
        <input type="date" id="date_from" name="date_from" class="form-control" value="{{ date_from }}">
    </div>
    <div class="col-auto">
        <label for="date_to" class="form-label">To</label>
        <input type="date" id="date_to" name="date_to" class="form-control" value="{{ date_to }}">
    </div>
    <div class="col-auto mt-4">
        <button type="submit" class="btn btn-primary">Filter</button>
    </div>
</form>

<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header">Messages per Day</div>
            <div class="card-body"><canvas id="messagesChart"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header">Donations per Day</div>
            <div class="card-body"><canvas id="donationsChart"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header">Payment Status Distribution</div>
            <div class="card-body"><canvas id="paymentStatusChart"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card shadow">
            <div class="card-header">Donations by Category (Amount)</div>
            <div class="card-body"><canvas id="categoryChart"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const dateFrom = document.getElementById('date_from').value;
        const dateTo = document.getElementById('date_to').value;

        fetch(`?date_from=${dateFrom}&date_to=${dateTo}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(response => response.json())
            .then(data => {
                // Messages per Day Chart
                const msgCtx = document.getElementById('messagesChart').getContext('2d');
                new Chart(msgCtx, {
                    type: 'line',
                    data: {
                        labels: data.messages_per_day.map(d => new Date(d.day).toLocaleDateString()),
                        datasets: [{
                            label: 'Messages',
                            data: data.messages_per_day.map(d => d.count),
                            borderColor: 'rgba(75, 192, 192, 1)',
                            tension: 0.1
                        }]
                    }
                });

                // Donations per Day Chart
                const donCtx = document.getElementById('donationsChart').getContext('2d');
                new Chart(donCtx, {
                    type: 'bar',
                    data: {
                        labels: data.donations_per_day.map(d => new Date(d.day).toLocaleDateString()),
                        datasets: [{
                            label: 'Completed Donations',
                            data: data.donations_per_day.map(d => d.count),
                            backgroundColor: 'rgba(54, 162, 235, 0.6)'
                        }]
                    }
                });

                // Payment Status Chart
                const payCtx = document.getElementById('paymentStatusChart').getContext('2d');
                new Chart(payCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.payment_status_dist.map(d => d.payment_status),
                        datasets: [{
                            label: 'Payment Status',
                            data: data.payment_status_dist.map(d => d.count),
                            backgroundColor: [
                                'rgba(40, 167, 69, 0.7)', // Completed
                                'rgba(255, 193, 7, 0.7)',  // Pending
                                'rgba(220, 53, 69, 0.7)',  // Failed
                                'rgba(108, 117, 125, 0.7)' // Other
                            ]
                        }]
                    }
                });

                // Category Donations Chart
                const catCtx = document.getElementById('categoryChart').getContext('2d');
                new Chart(catCtx, {
                    type: 'pie',
                    data: {
                        labels: data.category_dist.map(d => d.category),
                        datasets: [{
                            label: 'Donation Amount',
                            data: data.category_dist.map(d => d.total),
                            backgroundColor: [
                                'rgba(255, 99, 132, 0.7)',
                                'rgba(54, 162, 235, 0.7)',
                                'rgba(255, 206, 86, 0.7)'
                            ]
                        }]
                    }
                });
            });
    });
</script>
{% endblock %}
